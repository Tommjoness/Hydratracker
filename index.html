<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="H2O+" />
  <meta name="theme-color" content="#060e1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>H2O+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family: 'Epilogue'; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060e1a; --s1: #0d1b2e; --s2: #122035; --s3: #172840;
      --water: #22d3ee; --water-glow: #22d3ee44;
      --tea: #f59e0b; --tea-glow: #f59e0b33;
      --success: #4ade80; --danger: #f87171;
      --text: #e2f0ff; --muted: #3d6080; --faint: #1a3050;
      --r: 14px; --r-sm: 10px;
      --font-display: 'Epilogue', 'Georgia', serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    html { height: 100%; }
    body { min-height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; padding-bottom: calc(env(safe-area-inset-bottom) + 24px); }
    .ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .amb-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.11; }
    .amb-blob.a { width: 400px; height: 400px; background: var(--water); top: -100px; left: -80px; }
    .amb-blob.b { width: 300px; height: 300px; background: var(--tea); bottom: 200px; right: -80px; }
    .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 0 16px 40px; }

    /* TABS */
    .tabs { display: flex; gap: 4px; background: var(--s1); border: 1px solid var(--faint); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 9px; border: none; border-radius: 9px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; background: none; color: var(--muted); }
    .tab.active { background: var(--s3); color: var(--text); }

    /* HEADER */
    .header { padding: 52px 0 20px; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
    .brand { font-family: var(--font-display); font-weight: 900; font-size: clamp(22px, 6vw, 28px); letter-spacing: -1px; line-height: 1; flex-shrink: 0; }
    .brand .w { color: var(--water); }
    .brand .t { color: var(--tea); }
    .header-right { text-align: right; min-width: 0; }
    .date-str { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }


    /* PROGRESS */
    .progress-block { background: var(--s1); border: 1px solid var(--faint); border-radius: 20px; padding: 24px; margin-bottom: 14px; position: relative; overflow: hidden; }
    .progress-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--water), var(--tea)); border-radius: 20px 20px 0 0; transform-origin: left; transform: scaleX(var(--prog, 0)); transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .progress-numbers { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
    .total-ml { font-family: var(--font-display); font-weight: 900; font-size: clamp(40px, 12vw, 56px); letter-spacing: -2px; line-height: 1; }
    .total-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
    .goal-display { text-align: right; }
    .goal-value { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--muted); }
    .goal-label-sm { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .dual-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-type { font-size: 14px; width: 28px; flex-shrink: 0; }
    .bar-bg { flex: 1; height: 8px; background: var(--s3); border-radius: 100px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .bar-fill.water { background: var(--water); box-shadow: 0 0 8px var(--water-glow); }
    .bar-fill.tea { background: var(--tea); box-shadow: 0 0 8px var(--tea-glow); }
    .bar-ml { font-size: 10px; color: var(--muted); width: 48px; text-align: right; flex-shrink: 0; }
    .goal-reached { display: none; align-items: center; gap: 8px; margin-top: 14px; padding: 10px 14px; background: #0d2a1a; border: 1px solid #1a5c30; border-radius: var(--r-sm); font-size: 12px; color: var(--success); }
    .goal-reached.show { display: flex; }
    .divider { height: 1px; background: var(--faint); margin: 6px 0 14px; }

    /* GOAL */
    .goal-row { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .goal-row label { font-size: 10px; color: var(--muted); letter-spacing: 1.2px; text-transform: uppercase; }
    .goal-input-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .goal-inp { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--text); font-family: var(--font-display); font-weight: 700; font-size: 17px; width: 78px; padding: 7px 10px; text-align: right; transition: border-color 0.2s; }
    .goal-inp:focus { outline: none; border-color: var(--water); }
    .goal-inp-unit { font-size: 12px; color: var(--muted); }
    .section-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* ADD */
    .add-section { margin-bottom: 6px; }
    .add-section-header { margin-bottom: 10px; }
    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .add-card { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r); padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s; }
    .add-card.water:focus-within { border-color: #22d3ee44; }
    .add-card.tea:focus-within { border-color: #f59e0b33; }
    .card-title { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
    .add-card.water .card-title { color: var(--water); }
    .add-card.tea .card-title { color: var(--tea); }
    .ml-inp { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 18px; font-weight: 500; padding: 10px; width: 100%; text-align: center; transition: border-color 0.2s, box-shadow 0.2s; }
    .add-card.water .ml-inp:focus { outline: none; border-color: var(--water); box-shadow: 0 0 0 3px var(--water-glow); }
    .add-card.tea .ml-inp:focus { outline: none; border-color: var(--tea); box-shadow: 0 0 0 3px var(--tea-glow); }
    .quick-row { display: flex; gap: 5px; }
    .qbtn { flex: 1; background: var(--s2); border: 1px solid var(--faint); border-radius: 7px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 0; cursor: pointer; transition: all 0.15s; min-height: 40px; }
    .add-card.water .qbtn:hover, .add-card.water .qbtn:active { background: #0a2a35; border-color: var(--water); color: var(--water); }
    .add-card.tea .qbtn:hover, .add-card.tea .qbtn:active { background: #2a1d04; border-color: var(--tea); color: var(--tea); }
    .add-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-family: var(--font-display); font-weight: 700; font-size: 13px; cursor: pointer; transition: transform 0.12s, filter 0.15s; min-height: 44px; }
    .add-btn:active { transform: scale(0.95); filter: brightness(0.9); }
    .add-card.water .add-btn { background: var(--water); color: #040d18; }
    .add-card.tea .add-btn { background: var(--tea); color: #180c00; }

    /* NOTIFICATIE INSTELLING */
    .notif-row { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .notif-left { display: flex; flex-direction: column; gap: 3px; }
    .notif-title { font-size: 11px; color: var(--text); }
    .notif-sub { font-size: 10px; color: var(--muted); }
    .notif-btn { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; min-height: 36px; }
    .notif-btn.active { background: #0a2a1a; border-color: var(--success); color: var(--success); }
    .notif-time-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .notif-time-wrap.hidden { display: none; }
    .notif-time-label { font-size: 10px; color: var(--muted); }
    .time-inp { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 6px 10px; }
    .time-inp:focus { outline: none; border-color: var(--water); }
    .add-time-btn { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 6px 12px; cursor: pointer; transition: all 0.15s; min-height: 36px; }
    .add-time-btn:hover { border-color: var(--water); color: var(--water); }
    .time-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .time-chip { display: flex; align-items: center; gap: 6px; background: var(--s2); border: 1px solid var(--faint); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text); }
    .time-chip-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
    .time-chip-del:hover { color: var(--danger); }

    /* LOG */
    .log-section { margin-top: 20px; }
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .reset-btn { background: none; border: 1px solid var(--faint); border-radius: 6px; color: var(--muted); font-family: var(--font-mono); font-size: 10px; padding: 6px 12px; cursor: pointer; transition: all 0.15s; min-height: 32px; }
    .reset-btn:hover { border-color: var(--danger); color: var(--danger); }
    .log-list { display: flex; flex-direction: column; gap: 6px; }
    .log-item { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r-sm); padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .log-left { display: flex; align-items: center; gap: 10px; }
    .log-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-pip.water { background: var(--water); box-shadow: 0 0 5px var(--water); }
    .log-pip.tea { background: var(--tea); box-shadow: 0 0 5px var(--tea); }
    .log-ml-val { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
    .log-item .log-ml-val.water { color: var(--water); }
    .log-item .log-ml-val.tea { color: var(--tea); }
    .log-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .log-right { display: flex; align-items: center; gap: 8px; }
    .log-time-val { font-size: 11px; color: var(--muted); }
    .del-btn { background: none; border: 1px solid transparent; color: var(--faint); cursor: pointer; font-size: 16px; border-radius: 6px; transition: all 0.15s; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
    .del-btn:hover { color: var(--danger); border-color: #3a1a1a; background: #1a0a0a; }
    .empty-state { text-align: center; color: var(--muted); font-size: 12px; padding: 28px; border: 1px dashed var(--faint); border-radius: var(--r-sm); }

    /* WEKELIJKSE STATS */
    .week-block { display: flex; flex-direction: column; gap: 12px; }
    .week-card { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r); padding: 18px; }
    .week-card-title { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
    .week-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .week-stat { display: flex; flex-direction: column; gap: 3px; }
    .week-stat-val { font-family: var(--font-display); font-weight: 900; font-size: 22px; color: var(--text); }
    .week-stat-val.water { color: var(--water); }
    .week-stat-val.tea { color: var(--tea); }
    .week-stat-val.success { color: var(--success); }
    .week-stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .week-bar-section { display: flex; flex-direction: column; gap: 6px; }
    .week-day-row { display: flex; align-items: center; gap: 8px; }
    .week-day-label { font-size: 10px; color: var(--muted); width: 26px; flex-shrink: 0; }
    .week-day-bar-bg { flex: 1; height: 6px; background: var(--s3); border-radius: 100px; overflow: hidden; position: relative; }
    .week-day-bar-fill { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
    .week-day-bar-fill.water { background: var(--water); }
    .week-day-bar-fill.combined { background: linear-gradient(90deg, var(--water) 60%, var(--tea)); }
    .week-day-ml { font-size: 10px; color: var(--muted); width: 44px; text-align: right; flex-shrink: 0; }
    .week-goal-line { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--success); opacity: 0.5; }

    /* HISTORY */
    .history-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .history-item { background: var(--s1); border: 1px solid var(--faint); border-radius: var(--r-sm); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .hist-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-dot.goal-met { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .hist-dot.goal-miss { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
    .hist-date { font-size: 11px; color: var(--muted); }
    .hist-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .hist-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .hist-chip { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
    .hist-chip.water { background: #0a2a38; color: var(--water); }
    .hist-chip.tea { background: #2a1c04; color: var(--tea); }
    .hist-total { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); }
    .hist-goal-str { font-size: 10px; color: var(--muted); }

    /* CONFIRM */
    .confirm-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: #060e1acc; backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; padding: 0 16px 40px; }
    .confirm-overlay.show { display: flex; }
    .confirm-box { background: var(--s1); border: 1px solid var(--faint); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .confirm-msg { font-size: 14px; color: var(--text); text-align: center; line-height: 1.6; }
    .confirm-msg strong { color: var(--danger); font-family: var(--font-display); font-weight: 700; }
    .confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .confirm-cancel { background: var(--s3); border: 1px solid var(--faint); border-radius: 10px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; padding: 12px; cursor: pointer; min-height: 44px; }
    .confirm-ok { background: var(--danger); border: none; border-radius: 10px; color: #1a0000; font-family: var(--font-display); font-weight: 700; font-size: 13px; padding: 12px; cursor: pointer; min-height: 44px; }

    /* TOAST */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(90px); background: var(--s2); border: 1px solid var(--faint); border-radius: 100px; padding: 11px 22px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    @keyframes celebrate-pulse { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 0 6px #4ade8022; } }
    .progress-block.celebrate { animation: celebrate-pulse 0.8s ease 3; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
<div class="ambient">
  <div class="amb-blob a"></div>
  <div class="amb-blob b"></div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirmCancelBtn">Annuleren</button>
      <button class="confirm-ok" id="confirmOkBtn">Bevestigen</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="brand">H<span class="w">2</span>O<span class="t">+</span></div>
    <div class="header-right">
      <div class="date-str" id="dateStr"></div>

    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">Vandaag</button>
    <button class="tab" onclick="switchTab('week')">Week</button>
    <button class="tab" onclick="switchTab('settings')">Instellingen</button>
  </div>

  <!-- TAB: VANDAAG -->
  <div class="page active" id="page-today">
    <div class="progress-block" id="progressBlock">
      <div class="progress-numbers">
        <div>
          <div class="total-ml" id="totalMl">0</div>
          <div class="total-label">ml vandaag</div>
        </div>
        <div class="goal-display">
          <div class="goal-value" id="goalDisplay">/ 2000</div>
          <div class="goal-label-sm">dagdoel</div>
        </div>
      </div>
      <div class="dual-bar-wrap">
        <div class="bar-row">
          <div class="bar-type">💧</div>
          <div class="bar-bg"><div class="bar-fill water" id="waterBar" style="width:0%"></div></div>
          <div class="bar-ml" id="waterBarMl">0 ml</div>
        </div>
        <div class="bar-row">
          <div class="bar-type">🍵</div>
          <div class="bar-bg"><div class="bar-fill tea" id="teaBar" style="width:0%"></div></div>
          <div class="bar-ml" id="teaBarMl">0 ml</div>
        </div>
      </div>
      <div class="goal-reached" id="goalReached"><span>✓</span><span>Dagdoel gehaald!</span></div>
    </div>

    <div class="goal-row">
      <label>Dagdoel</label>
      <div class="goal-input-wrap">
        <input class="goal-inp" type="number" id="goalInp" value="2000" min="100" max="9999" inputmode="numeric" />
        <span class="goal-inp-unit">ml</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="add-section">
      <div class="add-section-header" style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div class="section-label">Toevoegen</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button onclick="document.getElementById('entryDateInp').value=localDateStr();updateUI();" style="background:var(--s3);border:1px solid var(--faint);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:10px;padding:5px 10px;cursor:pointer;min-height:30px;transition:all 0.15s;" onmouseover="this.style.color='var(--water)';this.style.borderColor='var(--water)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--faint)'">Vandaag</button>
          <input type="date" id="entryDateInp" style="background:var(--s3);border:1px solid var(--faint);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:11px;padding:5px 8px;color-scheme:dark;" />
        </div>
      </div>
      <div class="add-grid">
        <div class="add-card water">
          <div class="card-title">💧 Water</div>
          <input class="ml-inp" type="number" id="waterInp" placeholder="ml" inputmode="numeric" />
          <div class="quick-row">
            <button class="qbtn" onclick="setQ('water',150)">150</button>
            <button class="qbtn" onclick="setQ('water',250)">250</button>
            <button class="qbtn" onclick="setQ('water',500)">500</button>
          </div>
          <button class="add-btn" onclick="addEntry('water')">+ Toevoegen</button>
        </div>
        <div class="add-card tea">
          <div class="card-title">🍵 Thee</div>
          <input class="ml-inp" type="number" id="teaInp" placeholder="ml" inputmode="numeric" />
          <div class="quick-row">
            <button class="qbtn" onclick="setQ('tea',150)">150</button>
            <button class="qbtn" onclick="setQ('tea',200)">200</button>
            <button class="qbtn" onclick="setQ('tea',300)">300</button>
          </div>
          <button class="add-btn" onclick="addEntry('tea')">+ Toevoegen</button>
        </div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-header">
        <div class="section-label">Vandaag</div>
        <button class="reset-btn" onclick="confirmReset()">Dag resetten</button>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>

  <!-- TAB: WEEK -->
  <div class="page" id="page-week">
    <div class="week-block" id="weekBlock"></div>
  </div>

  <!-- TAB: INSTELLINGEN -->
  <div class="page" id="page-settings">
    <div class="notif-row" style="flex-direction:column;align-items:stretch;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
        <div class="notif-left">
          <div class="notif-title">Herinneringen</div>
          <div class="notif-sub" id="notifSub">Dagelijkse drink-herinneringen</div>
        </div>
        <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">Inschakelen</button>
      </div>
      <div class="notif-time-wrap hidden" id="notifTimeWrap">
        <div class="notif-time-label">Tijd toevoegen:</div>
        <input class="time-inp" type="time" id="timeInp" value="09:00" />
        <button class="add-time-btn" onclick="addNotifTime()">+ Voeg toe</button>
      </div>
      <div class="time-chips" id="timeChips"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'h2o_v4';
  const NOTIF_KEY = 'h2o_notif';

  function localDateStr(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function cutoffDateStr() {
    const d = new Date(); d.setDate(d.getDate() - 14); return localDateStr(d);
  }

  let mem = {};
  const store = {
    get() { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch { return mem; } },
    set(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch { mem = d; } }
  };

  function getToday(today) {
    const data = store.get();
    if (!data[today]) data[today] = { entries: [], goal: 2000 };
    if (!data[today].entries) data[today].entries = [];
    return { data, day: data[today] };
  }

  // Tabs
  let currentTab = 'today';
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['today','week','settings'][i] === tab);
    });
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    if (tab === 'week') renderWeek();
    if (tab === 'settings') renderNotifSettings();
  }

  // Goal input
  const goalInp = document.getElementById('goalInp');
  const _initToday = localDateStr();
  goalInp.value = getToday(_initToday).day.goal || 2000;

  goalInp.addEventListener('change', () => {
    const v = parseInt(goalInp.value);
    const today = localDateStr();
    if (!v || v < 100 || v > 9999) { showToast('Doel: 100–9999 ml.'); goalInp.value = getToday(today).day.goal; return; }
    const { data } = getToday(today);
    data[today].goal = v;
    store.set(data);
    updateUI();
  });

  function setQ(type, ml) { document.getElementById(type+'Inp').value = ml; }

  // Datumkiezer initialiseren op vandaag
  const entryDateInp = document.getElementById('entryDateInp');
  entryDateInp.value = localDateStr();
  entryDateInp.max = localDateStr(); // niet in de toekomst

  function addEntry(type) {
    const inp = document.getElementById(type+'Inp');
    const ml = parseInt(inp.value);
    if (!ml || ml <= 0 || ml > 5000) { showToast('Vul een hoeveelheid in (1–5000 ml).'); return; }
    const selectedDate = entryDateInp.value || localDateStr();
    const today = localDateStr();
    const { data } = getToday(selectedDate);
    const prevTotal = data[selectedDate].entries.reduce((s,e)=>s+e.ml,0);
    const timeLabel = selectedDate === today
      ? new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})
      : '—';
    data[selectedDate].entries.unshift({ type, ml, time: timeLabel, id: Date.now() });
    store.set(data);
    inp.value = '';
    updateUI();
    const newTotal = data[selectedDate].entries.reduce((s,e)=>s+e.ml,0);
    const isToday = selectedDate === today;
    if (isToday && prevTotal < data[selectedDate].goal && newTotal >= data[selectedDate].goal) {
      showToast('🎉 Dagdoel gehaald!');
      const pb = document.getElementById('progressBlock');
      pb.classList.remove('celebrate'); void pb.offsetWidth; pb.classList.add('celebrate');
      setTimeout(() => pb.classList.remove('celebrate'), 2600);
    } else {
      const dateLabel = isToday ? '' : ' voor ' + new Date(selectedDate+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
      showToast('+'+ml+' ml '+(type==='water'?'water':'thee')+' gelogd'+dateLabel);
    }
  }

  // Confirm dialog
  let confirmCallback = null;
  function openConfirm(msg, label, cb) {
    document.getElementById('confirmMsg').innerHTML = msg;
    document.getElementById('confirmOkBtn').textContent = label;
    confirmCallback = cb;
    document.getElementById('confirmOverlay').classList.add('show');
  }
  function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); confirmCallback = null; }
  document.getElementById('confirmOkBtn').addEventListener('click', () => { if (confirmCallback) confirmCallback(); closeConfirm(); });
  document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
  document.getElementById('confirmOverlay').addEventListener('click', function(e) { if (e.target===this) closeConfirm(); });

  function confirmDelete(id, ml, type) {
    openConfirm('<strong>'+ml+' ml '+(type==='water'?'water':'thee')+'</strong> verwijderen?', 'Verwijderen', () => {
      const today = localDateStr();
      const { data } = getToday(today);
      data[today].entries = data[today].entries.filter(e=>e.id!==id);
      store.set(data); updateUI();
    });
  }

  function confirmReset() {
    openConfirm('Alle logs van <strong>vandaag</strong> verwijderen?', 'Resetten', () => {
      const today = localDateStr();
      const { data } = getToday(today);
      data[today].entries = [];
      store.set(data); updateUI(); showToast('Dag gereset.');
    });
  }

  function updateUI() {
    const today = localDateStr();
    const { data, day } = getToday(today);
    const entries = day.entries || [];
    const goal = day.goal || 2000;
    const waterMl = entries.filter(e=>e.type==='water').reduce((s,e)=>s+e.ml,0);
    const teaMl = entries.filter(e=>e.type==='tea').reduce((s,e)=>s+e.ml,0);
    const total = waterMl + teaMl;

    document.getElementById('dateStr').textContent = new Date().toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();

    document.getElementById('progressBlock').style.setProperty('--prog', Math.min(total/goal,1));
    document.getElementById('totalMl').textContent = total;
    document.getElementById('goalDisplay').textContent = '/ '+goal;
    document.getElementById('waterBar').style.width = Math.min(waterMl/goal*100,100)+'%';
    document.getElementById('teaBar').style.width = Math.min(teaMl/goal*100,100)+'%';
    document.getElementById('waterBarMl').textContent = waterMl+' ml';
    document.getElementById('teaBarMl').textContent = teaMl+' ml';
    document.getElementById('goalReached').className = 'goal-reached'+(total>=goal?' show':'');
    goalInp.value = goal;

    const ll = document.getElementById('logList');
    ll.innerHTML = entries.length === 0
      ? '<div class="empty-state">Nog niets gelogd vandaag.</div>'
      : entries.map(e => `<div class="log-item">
          <div class="log-left"><div class="log-pip ${e.type}"></div>
            <div><div class="log-ml-val ${e.type}">${e.ml} ml</div><div class="log-sub">${e.type==='water'?'💧 Water':'🍵 Thee'}</div></div>
          </div>
          <div class="log-right"><div class="log-time-val">${e.time}</div>
            <button class="del-btn" onclick="confirmDelete(${e.id},${e.ml},'${e.type}')">×</button>
          </div></div>`).join('');

    const cutoff = cutoffDateStr();
    Object.keys(data).forEach(k => { if (k < cutoff) delete data[k]; });
    store.set(data);
  }

  // ─── WEEK TAB ───
  function renderWeek() {
    const today = localDateStr();
    const data = store.get();
    const dayLabels = ['zo','ma','di','wo','do','vr','za'];
    const result = [];
    let totalW = 0, totalT = 0, goalDays = 0;

    // Bereken de maandag van de huidige week
    const now = new Date();
    const dow = now.getDay(); // 0=zo, 1=ma, ..., 6=za
    const mondayOffset = dow === 0 ? -6 : 1 - dow; // maandag = start
    const monday = new Date(now);
    monday.setDate(now.getDate() + mondayOffset);

    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      const key = localDateStr(d);
      const de = (data[key] && data[key].entries) ? data[key].entries : [];
      const dGoal = (data[key] && data[key].goal) ? data[key].goal : 2000;
      const dw = de.filter(e=>e.type==='water').reduce((s,e)=>s+e.ml,0);
      const dt = de.filter(e=>e.type==='tea').reduce((s,e)=>s+e.ml,0);
      const dTotal = dw + dt;
      const isToday = key === today;
      totalW += dw; totalT += dt;
      if (dTotal >= dGoal) goalDays++;
      result.push({ label: dayLabels[d.getDay()], dw, dt, dTotal, dGoal, isToday });
    }

    const maxVal = Math.max(...result.map(r=>r.dTotal), 1);
    const avgTotal = Math.round((totalW + totalT) / 7);

    document.getElementById('weekBlock').innerHTML = `
      <div class="week-card">
        <div class="week-card-title">Deze week</div>
        <div class="week-stat-row">
          <div class="week-stat"><div class="week-stat-val water">${totalW} ml</div><div class="week-stat-label">Water</div></div>
          <div class="week-stat"><div class="week-stat-val tea">${totalT} ml</div><div class="week-stat-label">Thee</div></div>
          <div class="week-stat"><div class="week-stat-val">${totalW+totalT} ml</div><div class="week-stat-label">Totaal</div></div>
        </div>
        <div class="week-bar-section">
          ${[...result].reverse().map(r => {
            const pct = r.dTotal / maxVal * 100;
            const goalPct = Math.min(r.dGoal / maxVal * 100, 100);
            return `<div class="week-day-row">
              <div class="week-day-label" style="${r.isToday?'color:var(--water);font-weight:700':''}">${r.label}</div>
              <div class="week-day-bar-bg">
                <div class="week-day-bar-fill combined" style="width:${pct}%"></div>
                <div class="week-goal-line" style="left:${goalPct}%"></div>
              </div>
              <div class="week-day-ml">${r.dTotal}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="week-card">
        <div class="week-card-title">Afgelopen 14 dagen</div>
        <div class="history-list">
          ${(() => {
            const hdays = Object.keys(data).filter(k=>k!==today).sort().reverse().slice(0,10);
            if (!hdays.length) return '<div class="empty-state">Nog geen geschiedenis.</div>';
            return hdays.map(d => {
              const de = data[d].entries || [];
              const dw = de.filter(e=>e.type==='water').reduce((s,e)=>s+e.ml,0);
              const dt = de.filter(e=>e.type==='tea').reduce((s,e)=>s+e.ml,0);
              const dTotal = dw+dt;
              const dGoal = data[d].goal || 2000;
              const met = dTotal >= dGoal;
              const dl = new Date(d+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
              return `<div class="history-item">
                <div class="hist-left"><div class="hist-dot ${met?'goal-met':'goal-miss'}"></div><div class="hist-date">${dl}</div></div>
                <div class="hist-right">
                  <div class="hist-chips">
                    ${dw>0?'<span class="hist-chip water">💧 '+dw+'</span>':''}
                    ${dt>0?'<span class="hist-chip tea">🍵 '+dt+'</span>':''}
                    <span class="hist-total">${dTotal} ml</span>
                  </div>
                  <div class="hist-goal-str">doel: ${dGoal} ml</div>
                </div></div>`;
            }).join('');
          })()}
        </div>
      </div>`;
  }

  // ─── NOTIFICATIES ───
  function getNotifSettings() {
    try { return JSON.parse(localStorage.getItem(NOTIF_KEY)||'{"enabled":false,"times":[]}'); }
    catch { return { enabled: false, times: [] }; }
  }
  function saveNotifSettings(s) { try { localStorage.setItem(NOTIF_KEY, JSON.stringify(s)); } catch {} }

  let notifEnabled = false;

  async function toggleNotif() {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) {
      showToast('Herinneringen worden niet ondersteund in deze browser.'); return;
    }
    const s = getNotifSettings();
    if (!s.enabled) {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { showToast('Toestemming geweigerd. Sta notificaties toe in je browserinstellingen.'); return; }
      s.enabled = true;
      if (!s.times.length) s.times = ['08:00','12:00','18:00'];
      saveNotifSettings(s);
      scheduleNotifications(s.times);
      showToast('Herinneringen ingeschakeld.');
    } else {
      s.enabled = false;
      saveNotifSettings(s);
      showToast('Herinneringen uitgeschakeld.');
    }
    renderNotifSettings();
  }

  function addNotifTime() {
    const val = document.getElementById('timeInp').value;
    if (!val) return;
    const s = getNotifSettings();
    if (s.times.includes(val)) { showToast('Dit tijdstip staat er al bij.'); return; }
    if (s.times.length >= 8) { showToast('Maximaal 8 tijdstippen.'); return; }
    s.times.push(val);
    s.times.sort();
    saveNotifSettings(s);
    if (s.enabled) scheduleNotifications(s.times);
    renderNotifSettings();
  }

  function removeNotifTime(t) {
    const s = getNotifSettings();
    s.times = s.times.filter(x=>x!==t);
    saveNotifSettings(s);
    if (s.enabled) scheduleNotifications(s.times);
    renderNotifSettings();
  }

  function scheduleNotifications(times) {
    // Sla tijden op in localStorage zodat SW ze kan ophalen
    // Lokale herinneringen via setTimeout (werkt zolang app open is)
    // Voor echte achtergrond-notificaties is een backend nodig — we informeren de gebruiker
    try { localStorage.setItem('h2o_notif_times', JSON.stringify(times)); } catch {}
  }

  function renderNotifSettings() {
    const s = getNotifSettings();
    const btn = document.getElementById('notifBtn');
    const sub = document.getElementById('notifSub');
    const wrap = document.getElementById('notifTimeWrap');
    const chips = document.getElementById('timeChips');

    btn.textContent = s.enabled ? 'Uitschakelen' : 'Inschakelen';
    btn.className = 'notif-btn' + (s.enabled ? ' active' : '');
    sub.textContent = s.enabled ? 'Actief — tijdstippen instellen:' : 'Dagelijkse drink-herinneringen';
    wrap.className = 'notif-time-wrap' + (s.enabled ? '' : ' hidden');

    chips.innerHTML = s.times.map(t => `
      <div class="time-chip">
        <span>${t}</span>
        <button class="time-chip-del" onclick="removeNotifTime('${t}')">×</button>
      </div>`).join('');

    if (s.enabled && s.times.length) {
      setupLocalReminders(s.times);
    }
  }

  // Lokale reminders via setTimeout (werkt als app open/minimized is)
  let reminderTimers = [];
  function setupLocalReminders(times) {
    reminderTimers.forEach(clearTimeout);
    reminderTimers = [];
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    times.forEach(t => {
      const [h, m] = t.split(':').map(Number);
      const target = new Date(now);
      target.setHours(h, m, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const ms = target - now;
      const tid = setTimeout(() => {
        new Notification('H2O+ Herinnering 💧', {
          body: 'Vergeet niet te drinken!',
          icon: '/icon-192.png'
        });
        setupLocalReminders(times); // herplan voor morgen
      }, ms);
      reminderTimers.push(tid);
    });
  }

  // Init notif
  if (getNotifSettings().enabled && 'Notification' in window && Notification.permission === 'granted') {
    setupLocalReminders(getNotifSettings().times);
  }

  // Service Worker registratie
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let toastT;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2400);
  }

  updateUI();
</script>
</body>
</html>
